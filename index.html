<!DOCTYPE html>
<html lang="en">
<head>

<title>SmartPOS — Departmental Store Billing System</title>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #16161f;
    --bg4: #1e1e2a;
    --bg5: #252535;
    --surface: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f8;
    --text2: #9090b0;
    --text3: #5a5a7a;
    --accent: #6c63ff;
    --accent2: #8b83ff;
    --accent3: #3d35cc;
    --green: #2dd4a0;
    --green2: #1a8a68;
    --red: #ff6b6b;
    --red2: #cc4444;
    --amber: #ffb347;
    --amber2: #cc8a20;
    --blue: #60a5fa;
    --cyan: #22d3ee;
    --pink: #f472b6;
    --font: 'DM Sans', sans-serif;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --r: 10px;
    --r2: 14px;
    --r3: 18px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow2: 0 2px 12px rgba(0,0,0,0.3);
  }
  [data-theme="light"] {
    --bg: #f4f4f8;
    --bg2: #ebebf3;
    --bg3: #e2e2ec;
    --bg4: #d8d8e6;
    --bg5: #cecede;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.12);
    --text: #12121e;
    --text2: #4a4a6a;
    --text3: #8a8aaa;
    --accent: #5b52ee;
    --accent2: #4a42dd;
    --accent3: #7b73ff;
    --green: #18a076;
    --green2: #0d6b50;
    --red: #e05252;
    --red2: #b83a3a;
    --amber: #d48a20;
    --amber2: #a86a10;
    --blue: #2c7be5;
    --cyan: #0899b3;
    --pink: #db2777;
    --shadow: 0 4px 24px rgba(0,0,0,0.12);
    --shadow2: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
  
  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }
  
  /* LAYOUT */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: all 0.3s; }
  .sidebar.collapsed { width: 60px; min-width: 60px; }
  .main { flex: 1; overflow-y: auto; background: var(--bg); }
  
  /* SIDEBAR */
  .sidebar-logo { padding: 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 34px; height: 34px; min-width: 34px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; font-size: 16px; color: #fff; }
  .logo-text { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--text); white-space: nowrap; overflow: hidden; }
  .logo-sub { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }
  .sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
  .nav-group-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); padding: 12px 10px 4px; font-family: var(--font-display); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--r); cursor: pointer; transition: all 0.15s; margin-bottom: 2px; color: var(--text2); font-size: 13.5px; font-weight: 500; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--accent); color: #fff; }
  .nav-item .nav-icon { font-size: 16px; min-width: 20px; text-align: center; }
  .nav-item .nav-label { white-space: nowrap; overflow: hidden; }
  .nav-badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
  .sidebar-bottom { padding: 12px 8px; border-top: 1px solid var(--border); }
  
  /* TOPBAR */
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; height: 58px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-family: var(--font-display); font-weight: 700; font-size: 18px; flex: 1; }
  .topbar-subtitle { font-size: 12px; color: var(--text3); margin-left: 8px; font-weight: 400; font-family: var(--font); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--r); border: none; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-secondary { background: var(--bg4); color: var(--text); border: 1px solid var(--border2); }
  .btn-secondary:hover { background: var(--bg5); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }
  .btn-danger { background: var(--red2); color: #fff; }
  .btn-danger:hover { background: var(--red); }
  .btn-success { background: var(--green2); color: #fff; }
  .btn-success:hover { background: var(--green); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; }
  .btn-icon { padding: 8px; min-width: 36px; justify-content: center; }
  
  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2); padding: 20px; }
  .card-sm { padding: 14px 16px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 18px; }
  .stat-card .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-family: var(--font-display); margin-bottom: 8px; }
  .stat-card .stat-value { font-size: 28px; font-family: var(--font-display); font-weight: 700; color: var(--text); line-height: 1; }
  .stat-card .stat-change { font-size: 11px; margin-top: 8px; }
  .stat-up { color: var(--green); }
  .stat-down { color: var(--red); }
  
  /* FORM */
  input, select, textarea { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: var(--r); padding: 9px 12px; font-family: var(--font); font-size: 13.5px; outline: none; transition: border-color 0.15s; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }
  label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; font-weight: 500; }
  .form-group { margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  
  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-family: var(--font-display); border-bottom: 1px solid var(--border); font-weight: 600; }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13.5px; color: var(--text2); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg2); color: var(--text); }
  
  /* BADGE */
  .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(45,212,160,0.15); color: var(--green); }
  .badge-red { background: rgba(255,107,107,0.15); color: var(--red); }
  .badge-amber { background: rgba(255,179,71,0.15); color: var(--amber); }
  .badge-blue { background: rgba(96,165,250,0.15); color: var(--blue); }
  .badge-purple { background: rgba(108,99,255,0.15); color: var(--accent2); }
  
  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r3); padding: 28px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-lg { max-width: 800px; }
  .modal-sm { max-width: 400px; }
  .modal h2 { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  
  /* POS LAYOUT */
  .pos-layout { display: grid; grid-template-columns: 1fr 380px; height: calc(100vh - 58px); }
  .pos-left { overflow-y: auto; background: var(--bg); }
  .pos-right { background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  
  /* PRODUCT GRID */
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 20px; }
  .product-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 14px; cursor: pointer; transition: all 0.15s; position: relative; }
  .product-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow2); }
  .product-card.out-of-stock { opacity: 0.5; cursor: not-allowed; }
  .product-card .p-emoji { font-size: 32px; margin-bottom: 8px; }
  .product-card .p-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-card .p-price { font-size: 15px; font-family: var(--font-display); font-weight: 700; color: var(--accent2); }
  .product-card .p-stock { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .product-card .p-category { font-size: 10px; background: var(--bg4); color: var(--text3); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
  
  /* CART */
  .cart-header { padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .cart-header h3 { font-family: var(--font-display); font-size: 16px; font-weight: 700; }
  .cart-items { flex: 1; overflow-y: auto; padding: 8px; }
  .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--r); margin-bottom: 4px; background: var(--bg3); }
  .cart-item:hover { background: var(--bg4); }
  .ci-info { flex: 1; min-width: 0; }
  .ci-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ci-price { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .ci-total { font-size: 14px; font-family: var(--font-display); font-weight: 700; color: var(--accent2); min-width: 60px; text-align: right; }
  .qty-ctrl { display: flex; align-items: center; gap: 6px; }
  .qty-btn { width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg5); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; transition: all 0.1s; }
  .qty-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .qty-num { font-size: 13px; font-weight: 600; min-width: 24px; text-align: center; color: var(--text); }
  
  /* CART TOTALS */
  .cart-totals { padding: 14px 16px; border-top: 1px solid var(--border); background: var(--bg3); }
  .total-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; color: var(--text2); }
  .total-row.grand { font-size: 20px; font-family: var(--font-display); font-weight: 800; color: var(--text); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border2); }
  .total-row.grand .total-val { color: var(--green); }
  
  /* SEARCH BAR */
  .search-bar { padding: 14px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; display: flex; gap: 10px; align-items: center; }
  .search-input-wrap { position: relative; flex: 1; }
  .search-input-wrap input { padding-left: 38px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; }
  .cat-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 10px 20px; border-bottom: 1px solid var(--border); }
  .cat-tab { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid var(--border2); background: transparent; color: var(--text2); transition: all 0.15s; }
  .cat-tab:hover { background: var(--bg3); color: var(--text); }
  .cat-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  
  /* DASHBOARD */
  .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px; }
  .dash-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; padding: 0 24px 24px; }
  .dash-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 24px 24px; }
  .chart-wrap { position: relative; width: 100%; }
  
  /* INVOICE PRINT */
  .invoice { background: #fff; color: #000; padding: 24px; font-family: 'DM Sans', sans-serif; max-width: 320px; margin: 0 auto; font-size: 12px; }
  .inv-header { text-align: center; margin-bottom: 12px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
  .inv-header h2 { font-size: 18px; font-weight: 700; font-family: 'Syne', sans-serif; }
  .inv-table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .inv-table th { font-size: 10px; text-align: left; padding: 4px; border-bottom: 1px solid #ddd; }
  .inv-table td { font-size: 11px; padding: 4px; border-bottom: 1px dotted #eee; }
  
  /* NOTIFICATION */
  .notification { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .notif { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r2); padding: 12px 16px; min-width: 280px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease; }
  .notif.success { border-left: 3px solid var(--green); }
  .notif.error { border-left: 3px solid var(--red); }
  .notif.info { border-left: 3px solid var(--accent); }
  .notif.warning { border-left: 3px solid var(--amber); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  
  /* MISC */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .text-center { text-align: center; }
  .text-right { text-align: right; }
  .flex { display: flex; }
  .flex-col { display: flex; flex-direction: column; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .gap-4 { gap: 16px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .p-4 { padding: 16px; }
  .p-6 { padding: 24px; }
  .mb-2 { margin-bottom: 8px; }
  .mb-4 { margin-bottom: 16px; }
  .mb-6 { margin-bottom: 24px; }
  .mt-4 { margin-top: 16px; }
  .w-full { width: 100%; }
  .content-area { padding: 24px; }
  .section-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .section-sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 12px; background: var(--bg4); color: var(--text2); }
  .progress-bar { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .tag-input { display: flex; flex-wrap: wrap; gap: 6px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r); padding: 8px; min-height: 42px; align-items: center; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; font-family: var(--font-display); }
  select option { background: var(--bg3); }
  
  /* PAYMENT MODES */
  .pay-mode { border: 2px solid var(--border2); border-radius: var(--r2); padding: 14px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .pay-mode:hover { border-color: var(--accent); }
  .pay-mode.selected { border-color: var(--accent); background: rgba(108,99,255,0.12); }
  .pay-mode .pm-icon { font-size: 24px; margin-bottom: 6px; }
  .pay-mode .pm-label { font-size: 12px; font-weight: 600; color: var(--text2); }
  
  @media (max-width: 900px) {
    .pos-layout { grid-template-columns: 1fr; }
    .pos-right { display: none; }
    .dash-grid { grid-template-columns: 1fr 1fr; }
    .dash-row { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
  @media print {
    body * { visibility: hidden; }
    .invoice, .invoice * { visibility: visible; }
    .invoice { position: fixed; top: 0; left: 0; }
  }
</style>

  return (
    <div className="notification">
      {notifs.map(n => (
        <div key={n.id} className={`notif ${n.type}`} onClick={() => onRemove(n.id)} style={{cursor:'pointer'}}>
          <span style={{fontSize:'18px'}}>{n.type==='success'?'✅':n.type==='error'?'❌':n.type==='warning'?'⚠️':'ℹ️'}</span>
          <div>
            <div style={{fontSize:'13px',fontWeight:600,color:'var(--text)'}}>{n.title}</div>
            {n.msg && <div style={{fontSize:'12px',color:'var(--text2)',marginTop:'2px'}}>{n.msg}</div>}

  );
}

              <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',marginBottom:'3px'}}><span>CGST</span><span>₹{cgst.toFixed(2)}</span></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',marginBottom:'3px'}}><span>SGST</span><span>₹{sgst.toFixed(2)}</span></div>
              <div style={{display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:'14px',marginTop:'6px',paddingTop:'6px',borderTop:'1px solid #000'}}><span>GRAND TOTAL</span><span>₹{bill.total.toFixed(2)}</span></div>

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [theme, setTheme] = useState('dark');
  const [page, setPage] = useState('pos');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [notifs, setNotifs] = useState([]);
  const [products, setProducts] = useState(SAMPLE_PRODUCTS);
  const [customers, setCustomers] = useState(SAMPLE_CUSTOMERS);
  const [bills, setBills] = useState([]);
  const [cart, setCart] = useState([]);
  const [searchQ, setSearchQ] = useState('');
  const [activeCategory, setActiveCategory] = useState('All');
  const [customerSearch, setCustomerSearch] = useState('');
  const [selectedCustomer, setSelectedCustomer] = useState(null);
  const [discountType, setDiscountType] = useState('pct');
  const [discountVal, setDiscountVal] = useState(0);
  const [paymentMode, setPaymentMode] = useState('Cash');
  const [cashPaid, setCashPaid] = useState('');
  const [showInvoice, setShowInvoice] = useState(null);
  const [showProductModal, setShowProductModal] = useState(false);
  const [showCustomerModal, setShowCustomerModal] = useState(false);
  const [editProduct, setEditProduct] = useState(null);
  const [editCustomer, setEditCustomer] = useState(null);
  const [activeStaff] = useState({ name:"Admin User", role:"admin", avatar:"AU" });
  const [showPaymentModal, setShowPaymentModal] = useState(false);
  const notifIdRef = useRef(0);
  const chartRef1 = useRef(null);
  const chartRef2 = useRef(null);
  const chartRef3 = useRef(null);
  const chartInst1 = useRef(null);
  const chartInst2 = useRef(null);
  const chartInst3 = useRef(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  const addNotif = useCallback((type, title, msg) => {
    const id = ++notifIdRef.current;
    setNotifs(prev => [...prev, {id, type, title, msg}]);
    setTimeout(() => setNotifs(prev => prev.filter(n => n.id !== id)), 3000);
  }, []);

  const removeNotif = useCallback((id) => setNotifs(prev => prev.filter(n => n.id !== id)), []);

  // Cart operations
  const addToCart = useCallback((product) => {
    if (product.stock <= 0) { addNotif('error','Out of Stock',`${product.name} is not available`); return; }
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id);
      if (existing) {
        if (existing.qty >= product.stock) { addNotif('warning','Stock Limit',`Only ${product.stock} units available`); return prev; }
        return prev.map(i => i.id === product.id ? {...i, qty: i.qty+1} : i);
      }
      return [...prev, {...product, qty:1}];
    });
  }, [addNotif]);

  const updateQty = useCallback((id, delta) => {
    setCart(prev => {
      const item = prev.find(i => i.id === id);
      if (!item) return prev;
      const prod = products.find(p => p.id === id);
      const newQty = item.qty + delta;
      if (newQty <= 0) return prev.filter(i => i.id !== id);
      if (prod && newQty > prod.stock) { addNotif('warning','Stock Limit',`Only ${prod.stock} available`); return prev; }
      return prev.map(i => i.id === id ? {...i, qty: newQty} : i);
    });
  }, [products, addNotif]);

  const removeFromCart = useCallback((id) => setCart(prev => prev.filter(i => i.id !== id)), []);

  const clearCart = useCallback(() => {
    setCart([]);
    setSelectedCustomer(null);
    setDiscountVal(0);
    setDiscountType('pct');
    setPaymentMode('Cash');
    setCashPaid('');
    setCustomerSearch('');
  }, []);

  // Calculations
  const cartCalc = useMemo(() => {
    const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
    const taxable = cart.reduce((s, i) => s + (i.gst > 0 ? i.price * i.qty : 0), 0);
    const gstAmt = cart.reduce((s, i) => s + (i.price * i.qty * i.gst / 100), 0);
    const discountAmt = discountType === 'pct' ? (subtotal * discountVal / 100) : Math.min(+discountVal, subtotal);
    const total = Math.max(0, subtotal + gstAmt - discountAmt);
    const change = cashPaid ? Math.max(0, +cashPaid - total) : 0;
    return { subtotal, taxable, gstAmt, discountAmt, total, change };
  }, [cart, discountType, discountVal, cashPaid]);

  // Process payment
  const processBill = useCallback(() => {
    if (cart.length === 0) { addNotif('error','Empty Cart','Add items to cart first'); return; }
    if (paymentMode === 'Cash' && cashPaid && +cashPaid < cartCalc.total) {
      addNotif('error','Insufficient Cash',`Need ₹${cartCalc.total.toFixed(2)}`); return;
    }
    const bill = {
      billNo: generateBillNo(),
      createdAt: new Date().toISOString(),
      items: cart.map(i => ({...i})),
      subtotal: cartCalc.subtotal,
      gst: cartCalc.gstAmt,
      discount: cartCalc.discountAmt,
      total: cartCalc.total,
      paymentMode,
      cashPaid: cashPaid ? +cashPaid : cartCalc.total,
      change: cartCalc.change,
      customerName: selectedCustomer?.name || '',
      customerPhone: selectedCustomer?.phone || '',
      customerId: selectedCustomer?.id || null,
      cashier: activeStaff.name
    };
    setBills(prev => [bill, ...prev]);
    setProducts(prev => prev.map(p => {
      const item = cart.find(c => c.id === p.id);
      return item ? {...p, stock: p.stock - item.qty} : p;
    }));
    if (selectedCustomer) {
      setCustomers(prev => prev.map(c => c.id === selectedCustomer.id ?
        {...c, totalPurchases: c.totalPurchases + cartCalc.total, visits: c.visits + 1} : c));
    }
    setShowInvoice(bill);
    setShowPaymentModal(false);
    clearCart();
    addNotif('success','Bill Generated!',`₹${cartCalc.total.toFixed(2)} — ${bill.billNo}`);
  }, [cart, cartCalc, paymentMode, cashPaid, selectedCustomer, activeStaff, clearCart, addNotif]);

  // Product form
  const handleSaveProduct = useCallback((data) => {
    if (editProduct) {
      setProducts(prev => prev.map(p => p.id === editProduct.id ? {...p,...data} : p));
      addNotif('success','Product Updated',data.name);
    } else {
      const newP = {...data, id: Date.now(), emoji: data.emoji||'📦', costPrice: data.costPrice||0};
      setProducts(prev => [...prev, newP]);
      addNotif('success','Product Added',data.name);
    }
    setShowProductModal(false);
    setEditProduct(null);
  }, [editProduct, addNotif]);

  const handleDeleteProduct = useCallback((id) => {
    setProducts(prev => prev.filter(p => p.id !== id));
    addNotif('info','Product Deleted','');
  }, [addNotif]);

  // Customer form
  const handleSaveCustomer = useCallback((data) => {
    if (editCustomer) {
      setCustomers(prev => prev.map(c => c.id === editCustomer.id ? {...c,...data} : c));
      addNotif('success','Customer Updated',data.name);
    } else {
      setCustomers(prev => [...prev, {...data, id:Date.now(), totalPurchases:0, visits:0, credit:0}]);
      addNotif('success','Customer Added',data.name);
    }
    setShowCustomerModal(false);
    setEditCustomer(null);
  }, [editCustomer, addNotif]);

  // Stats
  const stats = useMemo(() => {
    const today = new Date().toDateString();
    const todayBills = bills.filter(b => new Date(b.createdAt).toDateString() === today);
    const totalRevenue = bills.reduce((s,b) => s+b.total, 0);
    const todayRevenue = todayBills.reduce((s,b) => s+b.total, 0);
    const lowStockCount = products.filter(p => p.stock < 10).length;
    const topProducts = [...products].sort((a,b) => b.stock - a.stock).slice(0,5);
    return { totalRevenue, todayRevenue, todayBills: todayBills.length, totalBills: bills.length, lowStockCount, topProducts };
  }, [bills, products]);

  const filteredProducts = useMemo(() => {
    return products.filter(p => {
      const matchCat = activeCategory === 'All' || p.cat === activeCategory;
      const matchQ = !searchQ || p.name.toLowerCase().includes(searchQ.toLowerCase()) || p.barcode.includes(searchQ);
      return matchCat && matchQ;
    });
  }, [products, searchQ, activeCategory]);

  const filteredCustomers = useMemo(() => {
    if (!customerSearch) return customers;
    return customers.filter(c => c.name.toLowerCase().includes(customerSearch.toLowerCase()) || c.phone.includes(customerSearch));
  }, [customers, customerSearch]);

  // Chart init
  useEffect(() => {
    if (page !== 'dashboard') return;
    const isDark = theme === 'dark';
    const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
    const textColor = isDark ? '#9090b0' : '#4a4a6a';

    setTimeout(() => {
      if (chartRef1.current) {
        if (chartInst1.current) chartInst1.current.destroy();
        const labels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
        const data = [12400,18600,9800,22300,15700,28900,21000];
        chartInst1.current = new Chart(chartRef1.current, {
          type: 'bar',
          data: { labels, datasets: [{
            label: 'Revenue',
            data,
            backgroundColor: '#6c63ff',
            borderRadius: 6,
            borderSkipped: false,
          }]},
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend:{display:false} },
            scales: {
              y: { grid:{color:gridColor}, ticks:{color:textColor,callback:v=>'₹'+v/1000+'K'} },
              x: { grid:{display:false}, ticks:{color:textColor} }
            }
          }
        });
      }
      if (chartRef2.current) {
        if (chartInst2.current) chartInst2.current.destroy();
        chartInst2.current = new Chart(chartRef2.current, {
          type: 'doughnut',
          data: {
            labels: ['Groceries','Dairy','Beverages','Snacks','Others'],
            datasets: [{
              data: [35,22,18,15,10],
              backgroundColor: ['#6c63ff','#2dd4a0','#60a5fa','#ffb347','#f472b6'],
              borderWidth: 0,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend:{ position:'bottom', labels:{color:textColor,boxWidth:10,padding:12,font:{size:12}} } }
          }
        });
      }
      if (chartRef3.current) {
        if (chartInst3.current) chartInst3.current.destroy();
        const months = ['Jan','Feb','Mar','Apr','May','Jun'];
        chartInst3.current = new Chart(chartRef3.current, {
          type: 'line',
          data: {
            labels: months,
            datasets: [{
              label: 'Revenue',
              data: [145000,162000,138000,175000,198000,221000],
              borderColor: '#6c63ff',
              backgroundColor: 'rgba(108,99,255,0.08)',
              borderWidth: 2,
              pointBackgroundColor: '#6c63ff',
              fill: true,
              tension: 0.4,
            },{
              label: 'Profit',
              data: [32000,36000,29000,42000,48000,55000],
              borderColor: '#2dd4a0',
              backgroundColor: 'rgba(45,212,160,0.05)',
              borderWidth: 2,
              pointBackgroundColor: '#2dd4a0',
              fill: true,
              tension: 0.4,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend:{ labels:{color:textColor,boxWidth:10,font:{size:12}} } },
            scales: {
              y: { grid:{color:gridColor}, ticks:{color:textColor,callback:v=>'₹'+v/1000+'K'} },
              x: { grid:{display:false}, ticks:{color:textColor} }
            }
          }
        });
      }
    }, 100);
  }, [page, theme]);

  // ─── NAV ITEMS ─────────────────────────────────────────────────────────────
  const navItems = [
    { id:'pos', icon:'🛒', label:'POS Billing', group:'Main' },
    { id:'dashboard', icon:'📊', label:'Dashboard', group:'Main' },
    { id:'bills', icon:'🧾', label:'Bills & History', group:'Main' },
    { id:'products', icon:'📦', label:'Products', group:'Inventory' },
    { id:'inventory', icon:'📋', label:'Inventory', group:'Inventory', badge: stats.lowStockCount > 0 ? stats.lowStockCount : null },
    { id:'customers', icon:'👥', label:'Customers', group:'CRM' },
    { id:'reports', icon:'📈', label:'Reports', group:'Analytics' },
    { id:'settings', icon:'⚙️', label:'Settings', group:'System' },
  ];

  const groups = [...new Set(navItems.map(n=>n.group))];

  // ─── RENDER ────────────────────────────────────────────────────────────────
  return (
    <>
      <Notifications notifs={notifs} onRemove={removeNotif} />
      {showInvoice && <Invoice bill={showInvoice} storeInfo={STORE_INFO} onClose={()=>setShowInvoice(null)} />}
      {showProductModal && <ProductModal product={editProduct} categories={CATEGORIES.filter(c=>c!=='All')} onSave={handleSaveProduct} onClose={()=>{setShowProductModal(false);setEditProduct(null);}} />}
      {showCustomerModal && <CustomerModal customer={editCustomer} onSave={handleSaveCustomer} onClose={()=>{setShowCustomerModal(false);setEditCustomer(null);}} />}

      <div className="app">
        {/* SIDEBAR */}
        <aside className={`sidebar ${sidebarCollapsed?'collapsed':''}`}>
          <div className="sidebar-logo">
            <div className="logo-icon">S</div>
            {!sidebarCollapsed && <div>
              <div className="logo-text">SmartPOS</div>
              <div className="logo-sub">Retail System</div>
            </div>}
          </div>
          <nav className="sidebar-nav">
            {groups.map(grp => (
              <div key={grp}>
                {!sidebarCollapsed && <div className="nav-group-label">{grp}</div>}
                {navItems.filter(n=>n.group===grp).map(n => (
                  <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)} title={n.label}>
                    <span className="nav-icon">{n.icon}</span>
                    {!sidebarCollapsed && <span className="nav-label">{n.label}</span>}
                    {!sidebarCollapsed && n.badge && <span className="nav-badge">{n.badge}</span>}
                  </div>
                ))}
              </div>
            ))}
          </nav>
          <div className="sidebar-bottom">
            <div className="nav-item" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')} title="Toggle Theme">
              <span className="nav-icon">{theme==='dark'?'☀️':'🌙'}</span>
              {!sidebarCollapsed && <span className="nav-label">Toggle Theme</span>}
            </div>
            <div className="nav-item" onClick={()=>setSidebarCollapsed(c=>!c)} title="Collapse">
              <span className="nav-icon">{sidebarCollapsed?'»':'«'}</span>
              {!sidebarCollapsed && <span className="nav-label">Collapse</span>}
            </div>
            {!sidebarCollapsed && <div style={{padding:'10px 8px',display:'flex',alignItems:'center',gap:'10px'}}>
              <div className="avatar" style={{background:'var(--accent)',color:'#fff',fontSize:'12px',width:'30px',height:'30px'}}>{activeStaff.avatar}</div>
              <div>
                <div style={{fontSize:'12px',fontWeight:600,color:'var(--text)'}}>{activeStaff.name}</div>
                <div style={{fontSize:'10px',color:'var(--text3)',textTransform:'capitalize'}}>{activeStaff.role}</div>
              </div>
            </div>}
          </div>
        </aside>

        {/* MAIN */}
        <main className="main">
          {page === 'pos' && <POSPage products={filteredProducts} cart={cart} cartCalc={cartCalc} customers={filteredCustomers} selectedCustomer={selectedCustomer} customerSearch={customerSearch} searchQ={searchQ} activeCategory={activeCategory} discountType={discountType} discountVal={discountVal} paymentMode={paymentMode} cashPaid={cashPaid} showPaymentModal={showPaymentModal}
            onSearch={setSearchQ} onCategoryChange={setActiveCategory} onAddToCart={addToCart} onUpdateQty={updateQty} onRemoveItem={removeFromCart} onClearCart={clearCart} onCustomerSearch={setCustomerSearch} onSelectCustomer={c=>{setSelectedCustomer(c);setCustomerSearch(c.name);}} onDiscountTypeChange={setDiscountType} onDiscountValChange={setDiscountVal} onPaymentModeChange={setPaymentMode} onCashPaidChange={setCashPaid} onCheckout={()=>cart.length>0&&setShowPaymentModal(true)} onProcessBill={processBill} onClosePayment={()=>setShowPaymentModal(false)} />}

          {page === 'dashboard' && <DashboardPage stats={stats} bills={bills} products={products} chartRef1={chartRef1} chartRef2={chartRef2} chartRef3={chartRef3} />}

          {page === 'bills' && <BillsPage bills={bills} onViewInvoice={setShowInvoice} />}

          {page === 'products' && <ProductsPage products={products} onAdd={()=>{setEditProduct(null);setShowProductModal(true);}} onEdit={p=>{setEditProduct(p);setShowProductModal(true);}} onDelete={handleDeleteProduct} />}

          {page === 'inventory' && <InventoryPage products={products} />}

          {page === 'customers' && <CustomersPage customers={customers} bills={bills} onAdd={()=>{setEditCustomer(null);setShowCustomerModal(true);}} onEdit={c=>{setEditCustomer(c);setShowCustomerModal(true);}} />}

          {page === 'reports' && <ReportsPage bills={bills} products={products} />}

          {page === 'settings' && <SettingsPage storeInfo={STORE_INFO} />}
        </main>
      </div>
    </>
  );
}

// ─── POS PAGE ─────────────────────────────────────────────────────────────────
function POSPage({ products, cart, cartCalc, customers, selectedCustomer, customerSearch, searchQ, activeCategory, discountType, discountVal, paymentMode, cashPaid, showPaymentModal,
  onSearch, onCategoryChange, onAddToCart, onUpdateQty, onRemoveItem, onClearCart, onCustomerSearch, onSelectCustomer, onDiscountTypeChange, onDiscountValChange, onPaymentModeChange, onCashPaidChange, onCheckout, onProcessBill, onClosePayment }) {
  
  const cats = ["All","Groceries","Dairy","Beverages","Snacks","Bakery","Household","Personal Care","Vegetables","Fruits"];
  
  return (
    <div className="pos-layout">
      {/* LEFT: PRODUCT SELECTION */}
      <div className="pos-left">
        <div className="search-bar">
          <div className="search-input-wrap" style={{flex:1}}>
            <span className="search-icon">🔍</span>
            <input value={searchQ} onChange={e=>onSearch(e.target.value)} placeholder="Search products or scan barcode..." style={{paddingLeft:'38px'}} />
          </div>
          <div style={{fontSize:'12px',color:'var(--text3)',whiteSpace:'nowrap'}}>{products.length} items</div>
        </div>
        <div className="cat-tabs">
          {cats.map(c => <button key={c} className={`cat-tab ${activeCategory===c?'active':''}`} onClick={()=>onCategoryChange(c)}>{c}</button>)}
        </div>
        {products.length === 0 ? (
          <div className="empty-state"><div className="empty-icon">🔍</div><p>No products found</p></div>
        ) : (
          <div className="product-grid">
            {products.map(p => (
              <div key={p.id} className={`product-card ${p.stock<=0?'out-of-stock':''}`} onClick={()=>onAddToCart(p)}>
                <div className="p-category">{p.cat}</div>
                <div className="p-emoji">{p.emoji}</div>
                <div className="p-name">{p.name}</div>
                <div className="p-price">{formatCurrency(p.price)}</div>
                <div className="p-stock" style={{color: p.stock<10?'var(--red)':'var(--text3)'}}>
                  {p.stock<=0 ? '❌ Out of stock' : p.stock<10 ? `⚠️ Low: ${p.stock}` : `✓ ${p.stock} in stock`}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* RIGHT: CART */}
      <div className="pos-right">
        {/* Customer */}
        <div style={{padding:'12px 14px',borderBottom:'1px solid var(--border)'}}>
          <div style={{position:'relative'}}>
            <input value={customerSearch} onChange={e=>onCustomerSearch(e.target.value)} placeholder="👤 Search customer by name/phone..." style={{fontSize:'12.5px'}} />
            {customerSearch && !selectedCustomer && (
              <div style={{position:'absolute',top:'38px',left:0,right:0,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:'var(--r)',zIndex:10,maxHeight:'150px',overflowY:'auto'}}>
                {customers.length === 0 ? <div style={{padding:'10px',fontSize:'12px',color:'var(--text3)'}}>No customers found</div> :
                  customers.map(c => (
                    <div key={c.id} style={{padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',fontSize:'13px'}} onMouseDown={()=>onSelectCustomer(c)}>
                      <div style={{fontWeight:600,color:'var(--text)'}}>{c.name}</div>
                      <div style={{color:'var(--text3)',fontSize:'11px'}}>{c.phone}</div>
                    </div>
                  ))
                }
              </div>
            )}
          </div>
          {selectedCustomer && <div style={{marginTop:'6px',padding:'6px 8px',background:'var(--bg4)',borderRadius:'6px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'12px',color:'var(--green)',fontWeight:600}}>✓ {selectedCustomer.name}</span>
            <span style={{fontSize:'11px',color:'var(--text3)'}}>{selectedCustomer.phone}</span>
          </div>}
        </div>

        {/* Cart Header */}
        <div className="cart-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <h3>🛒 Cart ({cart.length})</h3>
            <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'2px'}}>{cart.reduce((s,i)=>s+i.qty,0)} items total</div>
          </div>
          {cart.length > 0 && <button className="btn btn-ghost btn-xs" onClick={onClearCart}>🗑️ Clear</button>}
        </div>

        {/* Cart Items */}
        <div className="cart-items">
          {cart.length === 0 ? (
            <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}}>
              <div style={{fontSize:'40px',marginBottom:'8px'}}>🛒</div>
              <div style={{fontSize:'13px'}}>Cart is empty</div>
              <div style={{fontSize:'11px',marginTop:'4px'}}>Click products to add</div>
            </div>
          ) : cart.map(item => (
            <div key={item.id} className="cart-item">
              <span style={{fontSize:'20px'}}>{item.emoji}</span>
              <div className="ci-info">
                <div className="ci-name">{item.name}</div>
                <div className="ci-price">{formatCurrency(item.price)} × GST {item.gst}%</div>
              </div>
              <div className="qty-ctrl">
                <button className="qty-btn" onClick={()=>onUpdateQty(item.id,-1)}>−</button>
                <span className="qty-num">{item.qty}</span>
                <button className="qty-btn" onClick={()=>onUpdateQty(item.id,1)}>+</button>
              </div>
              <div className="ci-total">{formatCurrency(item.price*item.qty)}</div>
              <button onClick={()=>onRemoveItem(item.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:'14px',padding:'4px'}}>✕</button>
            </div>
          ))}
        </div>

        {/* Discount */}
        {cart.length > 0 && (
          <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',background:'var(--bg3)'}}>
            <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
              <span style={{fontSize:'12px',color:'var(--text2)',fontWeight:500,whiteSpace:'nowrap'}}>🏷️ Discount</span>
              <select value={discountType} onChange={e=>onDiscountTypeChange(e.target.value)} style={{width:'80px',padding:'5px 8px',fontSize:'12px'}}>
                <option value="pct">%</option>
                <option value="flat">₹ Flat</option>
              </select>
              <input type="number" value={discountVal} onChange={e=>onDiscountValChange(e.target.value)} min="0" max={discountType==='pct'?100:cartCalc.subtotal} style={{padding:'5px 8px',fontSize:'12px'}} placeholder="0" />
              {cartCalc.discountAmt > 0 && <span style={{fontSize:'12px',color:'var(--green)',whiteSpace:'nowrap'}}>-{formatCurrency(cartCalc.discountAmt)}</span>}
            </div>
          </div>
        )}

        {/* Totals */}
        <div className="cart-totals">
          <div className="total-row"><span>Subtotal</span><span>{formatCurrency(cartCalc.subtotal)}</span></div>
          {cartCalc.discountAmt > 0 && <div className="total-row" style={{color:'var(--green)'}}><span>Discount</span><span>-{formatCurrency(cartCalc.discountAmt)}</span></div>}
          <div className="total-row"><span>GST (CGST+SGST)</span><span>{formatCurrency(cartCalc.gstAmt)}</span></div>
          <div className="total-row grand"><span>Grand Total</span><span className="total-val">{formatCurrency(cartCalc.total)}</span></div>
          <button className="btn btn-primary w-full" style={{marginTop:'12px',padding:'13px',fontSize:'15px',fontFamily:'var(--font-display)',fontWeight:700,borderRadius:'var(--r2)'}} onClick={onCheckout} disabled={cart.length===0}>
            💳 CHECKOUT
          </button>
        </div>
      </div>

      {/* PAYMENT MODAL */}
      {showPaymentModal && (
        <div className="modal-overlay" onClick={onClosePayment}>
          <div className="modal modal-sm" onClick={e=>e.stopPropagation()}>
            <h2>💳 Payment</h2>
            <div style={{background:'var(--bg3)',borderRadius:'var(--r2)',padding:'16px',marginBottom:'16px',textAlign:'center'}}>
              <div style={{fontSize:'13px',color:'var(--text3)',marginBottom:'4px'}}>Amount Due</div>
              <div style={{fontSize:'36px',fontFamily:'var(--font-display)',fontWeight:800,color:'var(--green)'}}>{formatCurrency(cartCalc.total)}</div>
              {cartCalc.discountAmt > 0 && <div style={{fontSize:'12px',color:'var(--text3)'}}>Saved {formatCurrency(cartCalc.discountAmt)}</div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px',marginBottom:'16px'}}>
              {['Cash','UPI','Card'].map(m => (
                <div key={m} className={`pay-mode ${paymentMode===m?'selected':''}`} onClick={()=>onPaymentModeChange(m)}>
                  <div className="pm-icon">{m==='Cash'?'💵':m==='UPI'?'📱':'💳'}</div>
                  <div className="pm-label">{m}</div>
                </div>
              ))}
            </div>
            {paymentMode === 'Cash' && (
              <div className="form-group">
                <label>Cash Received (₹)</label>
                <input type="number" value={cashPaid} onChange={e=>onCashPaidChange(e.target.value)} placeholder={cartCalc.total.toFixed(2)} autoFocus />
                {cashPaid && +cashPaid >= cartCalc.total && (
                  <div style={{marginTop:'8px',padding:'8px 12px',background:'rgba(45,212,160,0.1)',borderRadius:'var(--r)',color:'var(--green)',fontSize:'13px',fontWeight:600}}>
                    Change: {formatCurrency(+cashPaid - cartCalc.total)}
                  </div>
                )}
              </div>
            )}
            {paymentMode === 'UPI' && (
              <div style={{textAlign:'center',padding:'16px',background:'var(--bg3)',borderRadius:'var(--r2)',marginBottom:'16px'}}>
                <div style={{fontSize:'40px',marginBottom:'8px'}}>📱</div>
                <div style={{fontSize:'13px',color:'var(--text2)'}}>Scan QR or enter UPI ID</div>
                <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'4px'}}>UPI: {STORE_INFO.phone}@upi</div>
              </div>
            )}
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={onClosePayment}>Cancel</button>
              <button className="btn btn-success" style={{fontSize:'14px',padding:'10px 24px'}} onClick={onProcessBill}>✓ Confirm Payment</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── DASHBOARD PAGE ───────────────────────────────────────────────────────────

  return (
    <div>
      <div className="topbar"><span className="topbar-title">Dashboard <span className="topbar-subtitle">Overview & Analytics</span></span>
        <span style={{fontSize:'12px',color:'var(--text3)'}}>📅 {new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</span>
      </div>
      <div className="dash-grid">
        <div className="stat-card">
          <div className="stat-label">Today's Revenue</div>
          <div className="stat-value">{formatCurrency(stats.todayRevenue)}</div>
          <div className="stat-change stat-up">↑ {stats.todayBills} bills today</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Total Revenue</div>
          <div className="stat-value">{formatCurrency(stats.totalRevenue)}</div>
          <div className="stat-change" style={{color:'var(--text3)'}}>{stats.totalBills} total bills</div>

        <div className="stat-card">
          <div className="stat-label">Products</div>
          <div className="stat-value">{products.length}</div>

        <div className="stat-card">
          <div className="stat-label">Avg Bill Value</div>
          <div className="stat-value">{stats.totalBills > 0 ? formatCurrency(stats.totalRevenue/stats.totalBills) : '₹0'}</div>

        </div>
      </div>

      <div className="dash-row">
        <div className="card">
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'15px',marginBottom:'16px'}}>📊 Weekly Revenue</div>
          <div style={{height:'220px',position:'relative'}}><canvas ref={chartRef1} role="img" aria-label="Weekly revenue bar chart" /></div>
        </div>
        <div className="card">
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'15px',marginBottom:'16px'}}>🏷️ Sales by Category</div>
          <div style={{height:'220px',position:'relative'}}><canvas ref={chartRef2} role="img" aria-label="Sales by category donut chart" /></div>
        </div>
      </div>

      <div style={{padding:'0 24px 24px'}}>
        <div className="card">
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'15px',marginBottom:'16px'}}>📈 Monthly Revenue & Profit</div>
          <div style={{height:'200px',position:'relative'}}><canvas ref={chartRef3} role="img" aria-label="Monthly revenue and profit line chart" /></div>
        </div>
      </div>

      <div className="dash-row-2">
        <div className="card">
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'15px',marginBottom:'14px'}}>⚠️ Low Stock Alerts</div>
          {lowStock.length === 0 && outOfStock.length === 0 ? (
            <div style={{color:'var(--green)',fontSize:'13px',padding:'12px 0'}}>✓ All stock levels are healthy</div>
          ) : (
            <div>
              {outOfStock.map(p => (
                <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                  <span style={{fontSize:'13px'}}>{p.emoji} {p.name}</span>
                  <span className="badge badge-red">Out of Stock</span>
                </div>
              ))}
              {lowStock.map(p => (
                <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                  <span style={{fontSize:'13px'}}>{p.emoji} {p.name}</span>
                  <span className="badge badge-amber">{p.stock} left</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="card">
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'15px',marginBottom:'14px'}}>🧾 Recent Bills</div>
          {bills.length === 0 ? <div style={{color:'var(--text3)',fontSize:'13px'}}>No bills yet</div> :
            bills.slice(0,5).map(b => (
              <div key={b.billNo} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div>
                  <div style={{fontSize:'13px',fontWeight:600,color:'var(--text)'}}>{b.billNo}</div>
                  <div style={{fontSize:'11px',color:'var(--text3)'}}>{b.customerName||'Walk-in'} • {formatTime(b.createdAt)}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:'13px',fontWeight:700,color:'var(--green)'}}>{formatCurrency(b.total)}</div>
                  <div style={{fontSize:'11px',color:'var(--text3)'}}>{b.paymentMode}</div>
                </div>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ─── BILLS PAGE ───────────────────────────────────────────────────────────────
function BillsPage({ bills, onViewInvoice }) {
  const [search, setSearch] = useState('');
  const filtered = bills.filter(b => !search || b.billNo.includes(search) || (b.customerName&&b.customerName.toLowerCase().includes(search.toLowerCase())));
  return (
    <div>
      <div className="topbar">
        <span className="topbar-title">Bills & History <span className="topbar-subtitle">{bills.length} total bills</span></span>
        <div className="search-input-wrap" style={{width:'240px'}}>
          <span className="search-icon">🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search bills..." style={{paddingLeft:'34px'}} />
        </div>
      </div>
      <div className="content-area">
        {filtered.length === 0 ? (
          <div className="empty-state"><div className="empty-icon">🧾</div><p>{bills.length===0?'No bills yet. Start billing!':'No matching bills found.'}</p></div>
        ) : (
          <div className="card" style={{padding:0}}>
            <table>
              <thead><tr><th>Bill No</th><th>Date & Time</th><th>Customer</th><th>Items</th><th>Payment</th><th>Total</th><th>Actions</th></tr></thead>
              <tbody>
                {filtered.map(b => (
                  <tr key={b.billNo}>
                    <td><span style={{fontFamily:'var(--font-mono)',fontSize:'12px',color:'var(--accent2)'}}>{b.billNo}</span></td>
                    <td><div style={{color:'var(--text)'}}>{formatDate(b.createdAt)}</div><div style={{fontSize:'11px',color:'var(--text3)'}}>{formatTime(b.createdAt)}</div></td>
                    <td>{b.customerName||<span style={{color:'var(--text3)'}}>Walk-in</span>}</td>
                    <td>{b.items.length} items • {b.items.reduce((s,i)=>s+i.qty,0)} qty</td>
                    <td><span className={`badge ${b.paymentMode==='Cash'?'badge-green':b.paymentMode==='UPI'?'badge-blue':'badge-purple'}`}>{b.paymentMode}</span></td>
                    <td><span style={{fontWeight:700,color:'var(--green)',fontFamily:'var(--font-display)'}}>{formatCurrency(b.total)}</span></td>
                    <td><button className="btn btn-ghost btn-xs" onClick={()=>onViewInvoice(b)}>🖨️ View</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── PRODUCTS PAGE ────────────────────────────────────────────────────────────
function ProductsPage({ products, onAdd, onEdit, onDelete }) {
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('All');
  const filtered = products.filter(p => {
    const ms = !search || p.name.toLowerCase().includes(search.toLowerCase()) || p.barcode.includes(search);
    const mc = catFilter==='All' || p.cat===catFilter;
    return ms && mc;
  });
  return (
    <div>
      <div className="topbar">
        <span className="topbar-title">Products <span className="topbar-subtitle">{products.length} total</span></span>
        <div className="search-input-wrap" style={{width:'200px'}}>
          <span className="search-icon">🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{paddingLeft:'34px'}} />
        </div>
        <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={{width:'140px'}}>
          {CATEGORIES.map(c=><option key={c}>{c}</option>)}
        </select>
        <button className="btn btn-primary" onClick={onAdd}>+ Add Product</button>
      </div>
      <div className="content-area">
        <div className="card" style={{padding:0}}>
          <table>
            <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>GST</th><th>Stock</th><th>Barcode</th><th>Actions</th></tr></thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.id}>
                  <td><div style={{display:'flex',alignItems:'center',gap:'8px'}}><span style={{fontSize:'20px'}}>{p.emoji}</span><div><div style={{color:'var(--text)',fontWeight:500}}>{p.name}</div></div></div></td>
                  <td><span className="badge badge-purple">{p.cat}</span></td>
                  <td style={{color:'var(--text)',fontWeight:600}}>{formatCurrency(p.price)}</td>
                  <td>{p.gst}%</td>
                  <td><span style={{color:p.stock<=0?'var(--red)':p.stock<10?'var(--amber)':'var(--green)',fontWeight:600}}>{p.stock} {p.unit}</span></td>
                  <td><span style={{fontFamily:'var(--font-mono)',fontSize:'11px',color:'var(--text3)'}}>{p.barcode}</span></td>
                  <td style={{display:'flex',gap:'4px'}}>
                    <button className="btn btn-ghost btn-xs" onClick={()=>onEdit(p)}>✏️</button>
                    <button className="btn btn-danger btn-xs" onClick={()=>onDelete(p.id)}>🗑️</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── INVENTORY PAGE ───────────────────────────────────────────────────────────
function InventoryPage({ products }) {
  const lowStock = products.filter(p => p.stock > 0 && p.stock < 10);
  const outStock = products.filter(p => p.stock <= 0);
  const healthy = products.filter(p => p.stock >= 10);
  return (
    <div>
      <div className="topbar"><span className="topbar-title">Inventory <span className="topbar-subtitle">Stock Management</span></span></div>
      <div className="content-area">
        <div className="dash-grid" style={{padding:0,marginBottom:'20px'}}>
          <div className="stat-card"><div className="stat-label">Total Products</div><div className="stat-value">{products.length}</div></div>
          <div className="stat-card"><div className="stat-label">Healthy Stock</div><div className="stat-value" style={{color:'var(--green)'}}>{healthy.length}</div></div>
          <div className="stat-card"><div className="stat-label">Low Stock</div><div className="stat-value" style={{color:'var(--amber)'}}>{lowStock.length}</div></div>
          <div className="stat-card"><div className="stat-label">Out of Stock</div><div className="stat-value" style={{color:'var(--red)'}}>{outStock.length}</div></div>
        </div>

        {outStock.length > 0 && (
          <div style={{background:'rgba(255,107,107,0.08)',border:'1px solid rgba(255,107,107,0.25)',borderRadius:'var(--r2)',padding:'16px',marginBottom:'16px'}}>
            <div style={{fontWeight:700,fontSize:'14px',color:'var(--red)',marginBottom:'10px'}}>❌ Out of Stock ({outStock.length})</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:'8px'}}>
              {outStock.map(p=>(
                <div key={p.id} style={{background:'var(--bg2)',borderRadius:'var(--r)',padding:'10px',display:'flex',alignItems:'center',gap:'8px'}}>
                  <span style={{fontSize:'20px'}}>{p.emoji}</span>
                  <div style={{fontSize:'12px',fontWeight:600,color:'var(--text)'}}>{p.name}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {lowStock.length > 0 && (
          <div style={{background:'rgba(255,179,71,0.08)',border:'1px solid rgba(255,179,71,0.25)',borderRadius:'var(--r2)',padding:'16px',marginBottom:'16px'}}>
            <div style={{fontWeight:700,fontSize:'14px',color:'var(--amber)',marginBottom:'10px'}}>⚠️ Low Stock ({lowStock.length})</div>
            <div className="card" style={{padding:0}}>
              <table>
                <thead><tr><th>Product</th><th>Category</th><th>Current Stock</th><th>Status</th></tr></thead>
                <tbody>
                  {lowStock.map(p=>(
                    <tr key={p.id}>
                      <td><div style={{display:'flex',alignItems:'center',gap:'8px'}}><span style={{fontSize:'18px'}}>{p.emoji}</span><span style={{color:'var(--text)',fontWeight:500}}>{p.name}</span></div></td>
                      <td>{p.cat}</td>
                      <td><span style={{fontFamily:'var(--font-mono)',fontWeight:700,color:'var(--amber)'}}>{p.stock} {p.unit}</span></td>
                      <td>
                        <div className="progress-bar" style={{width:'100px'}}><div className="progress-fill" style={{width:`${(p.stock/20)*100}%`,background:'var(--amber)'}} /></div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        <div className="card" style={{padding:0}}>
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',fontFamily:'var(--font-display)',fontWeight:700,fontSize:'15px'}}>📋 All Stock Levels</div>
          <table>
            <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Stock Level</th></tr></thead>
            <tbody>
              {products.map(p=>(
                <tr key={p.id}>
                  <td><div style={{display:'flex',alignItems:'center',gap:'8px'}}><span style={{fontSize:'18px'}}>{p.emoji}</span><span style={{color:'var(--text)',fontWeight:500}}>{p.name}</span></div></td>
                  <td>{p.cat}</td>
                  <td>{formatCurrency(p.price)}</td>
                  <td><span style={{fontWeight:600,color:p.stock<=0?'var(--red)':p.stock<10?'var(--amber)':'var(--green)'}}>{p.stock} {p.unit}</span></td>
                  <td style={{width:'140px'}}>
                    <div className="progress-bar"><div className="progress-fill" style={{width:`${Math.min(100,(p.stock/100)*100)}%`,background:p.stock<=0?'var(--red)':p.stock<10?'var(--amber)':'var(--green)'}} /></div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── CUSTOMERS PAGE ───────────────────────────────────────────────────────────
function CustomersPage({ customers, bills, onAdd, onEdit }) {
  const [search, setSearch] = useState('');
  const filtered = customers.filter(c => !search || c.name.toLowerCase().includes(search.toLowerCase()) || c.phone.includes(search));
  return (
    <div>
      <div className="topbar">
        <span className="topbar-title">Customers <span className="topbar-subtitle">{customers.length} registered</span></span>
        <div className="search-input-wrap" style={{width:'220px'}}>
          <span className="search-icon">🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search customers..." style={{paddingLeft:'34px'}} />
        </div>
        <button className="btn btn-primary" onClick={onAdd}>+ Add Customer</button>
      </div>
      <div className="content-area">
        <div className="card" style={{padding:0}}>
          <table>
            <thead><tr><th>Customer</th><th>Phone</th><th>City</th><th>Visits</th><th>Total Purchases</th><th>Credit</th><th>Actions</th></tr></thead>
            <tbody>
              {filtered.map(c=>(
                <tr key={c.id}>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                      <div className="avatar" style={{background:'var(--accent)',color:'#fff',width:'32px',height:'32px',fontSize:'12px'}}>{c.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
                      <div>
                        <div style={{color:'var(--text)',fontWeight:600}}>{c.name}</div>
                        {c.email && <div style={{fontSize:'11px',color:'var(--text3)'}}>{c.email}</div>}
                      </div>
                    </div>
                  </td>
                  <td style={{fontFamily:'var(--font-mono)',fontSize:'12px'}}>{c.phone}</td>
                  <td>{c.city}</td>
                  <td><span className="badge badge-blue">{c.visits} visits</span></td>
                  <td style={{fontWeight:700,color:'var(--green)'}}>{formatCurrency(c.totalPurchases)}</td>
                  <td>{c.credit>0?<span className="badge badge-amber">₹{c.credit} due</span>:<span style={{color:'var(--text3)',fontSize:'12px'}}>—</span>}</td>
                  <td><button className="btn btn-ghost btn-xs" onClick={()=>onEdit(c)}>✏️ Edit</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── REPORTS PAGE ─────────────────────────────────────────────────────────────
function ReportsPage({ bills, products }) {
  const payModes = bills.reduce((acc,b)=>{acc[b.paymentMode]=(acc[b.paymentMode]||0)+b.total;return acc;},{});
  const topProducts = [...products].sort((a,b)=>b.price-a.price).slice(0,8);
  const gstCollected = bills.reduce((s,b)=>s+b.gst,0);
  const totalRevenue = bills.reduce((s,b)=>s+b.total,0);
  const totalDiscount = bills.reduce((s,b)=>s+b.discount,0);
  return (
    <div>
      <div className="topbar"><span className="topbar-title">Reports <span className="topbar-subtitle">Analytics & Insights</span></span>
        <button className="btn btn-secondary">📥 Export CSV</button>
      </div>
      <div className="content-area">
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'16px',marginBottom:'20px'}}>
          <div className="stat-card"><div className="stat-label">Total Revenue</div><div className="stat-value">{formatCurrency(totalRevenue)}</div></div>
          <div className="stat-card"><div className="stat-label">GST Collected</div><div className="stat-value">{formatCurrency(gstCollected)}</div></div>
          <div className="stat-card"><div className="stat-label">Total Discounts</div><div className="stat-value" style={{color:'var(--amber)'}}>{formatCurrency(totalDiscount)}</div></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'20px'}}>
          <div className="card">
            <div style={{fontFamily:'var(--font-display)',fontWeight:700,marginBottom:'14px'}}>💳 Revenue by Payment Mode</div>
            {Object.entries(payModes).length === 0 ? <div style={{color:'var(--text3)',fontSize:'13px'}}>No data yet</div> :
              Object.entries(payModes).map(([mode,amt])=>(
                <div key={mode} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                  <span style={{fontSize:'13px',color:'var(--text)'}}>{mode==='Cash'?'💵':mode==='UPI'?'📱':'💳'} {mode}</span>
                  <span style={{fontWeight:700,color:'var(--green)',fontSize:'14px'}}>{formatCurrency(amt)}</span>
                </div>
              ))
            }
          </div>
          <div className="card">
            <div style={{fontFamily:'var(--font-display)',fontWeight:700,marginBottom:'14px'}}>🏆 Top Products by Price</div>
            {topProducts.map((p,i)=>(
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:'11px',fontFamily:'var(--font-display)',fontWeight:700,color:'var(--text3)',minWidth:'20px'}}>#{i+1}</span>
                <span style={{fontSize:'16px'}}>{p.emoji}</span>
                <span style={{fontSize:'12px',color:'var(--text)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
                <span style={{fontSize:'13px',fontWeight:700,color:'var(--accent2)'}}>{formatCurrency(p.price)}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,marginBottom:'14px'}}>📋 GST Summary (India Compliant)</div>
          <table>
            <thead><tr><th>Tax Rate</th><th>Taxable Amount</th><th>CGST</th><th>SGST</th><th>Total GST</th></tr></thead>
            <tbody>
              {[0,5,12,18].map(rate=>{
                const taxable = bills.reduce((s,b)=>s+b.items.filter(i=>i.gst===rate).reduce((ss,i)=>ss+i.price*i.qty,0),0);
                const gst = taxable * rate / 100;
                return (
                  <tr key={rate}>
                    <td><span className="badge badge-blue">{rate}%</span></td>
                    <td>{formatCurrency(taxable)}</td>
                    <td>{formatCurrency(gst/2)}</td>
                    <td>{formatCurrency(gst/2)}</td>
                    <td style={{fontWeight:700,color:'var(--text)'}}>{formatCurrency(gst)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── SETTINGS PAGE ────────────────────────────────────────────────────────────
function SettingsPage({ storeInfo }) {
  return (
    <div>
      <div className="topbar"><span className="topbar-title">Settings</span></div>
      <div className="content-area" style={{maxWidth:'640px'}}>
        <div className="card mb-4">
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'15px',marginBottom:'16px'}}>🏪 Store Information</div>
          <div className="form-group"><label>Store Name</label><input defaultValue={storeInfo.name} /></div>
          <div className="form-row">
            <div className="form-group"><label>Phone</label><input defaultValue={storeInfo.phone} /></div>
            <div className="form-group"><label>Email</label><input defaultValue={storeInfo.email} /></div>
          </div>
          <div className="form-group"><label>GSTIN</label><input defaultValue={storeInfo.gstin} style={{fontFamily:'var(--font-mono)'}} /></div>
          <div className="form-group"><label>Address</label><textarea defaultValue={storeInfo.address} rows={2} /></div>
          <button className="btn btn-primary">💾 Save Changes</button>
        </div>
        <div className="card mb-4">
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'15px',marginBottom:'16px'}}>🖨️ Receipt Settings</div>
          <div className="form-group"><label>Receipt Width</label>
            <select defaultValue="80mm"><option>80mm (Thermal)</option><option>58mm (Narrow)</option><option>A4</option></select>
          </div>
          <div className="form-group"><label>Footer Message</label><input defaultValue="Thank you for shopping with us!" /></div>
          <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'14px'}}>
            <input type="checkbox" id="showLogo" defaultChecked style={{width:'auto'}} />
            <label htmlFor="showLogo" style={{margin:0}}>Show store logo on receipt</label>
          </div>
          <button className="btn btn-primary">💾 Save Receipt Settings</button>
        </div>
        <div className="card">
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'15px',marginBottom:'16px'}}>🔐 Security</div>
          <div className="form-group"><label>Current Password</label><input type="password" /></div>
          <div className="form-row">
            <div className="form-group"><label>New Password</label><input type="password" /></div>
            <div className="form-group"><label>Confirm Password</label><input type="password" /></div>
          </div>
          <button className="btn btn-primary">🔒 Change Password</button>
        </div>
      </div>
    </div>
  );
}

// ─── PRODUCT MODAL ────────────────────────────────────────────────────────────
function ProductModal({ product, categories, onSave, onClose }) {
  const [form, setForm] = useState(product || { name:'',cat:'Groceries',price:'',gst:0,barcode:'',stock:'',unit:'pcs',emoji:'📦',costPrice:'' });
  const set = (k,v) => setForm(prev=>({...prev,[k]:v}));
  const handleSubmit = () => {
    if (!form.name || !form.price) return;
    onSave({...form, price:+form.price, gst:+form.gst, stock:+form.stock, costPrice:+form.costPrice});
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>{product?'✏️ Edit Product':'+ New Product'}</h2>
        <div className="form-row">
          <div className="form-group" style={{gridColumn:'1/-1'}}>
            <label>Product Name *</label>
            <input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Enter product name" />
          </div>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label>Category</label>
            <select value={form.cat} onChange={e=>set('cat',e.target.value)}>
              {categories.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label>Emoji Icon</label>
            <input value={form.emoji} onChange={e=>set('emoji',e.target.value)} placeholder="📦" />
          </div>
        </div>
        <div className="form-row-3">
          <div className="form-group">
            <label>Sale Price (₹) *</label>
            <input type="number" value={form.price} onChange={e=>set('price',e.target.value)} placeholder="0.00" />
          </div>
          <div className="form-group">
            <label>Cost Price (₹)</label>
            <input type="number" value={form.costPrice} onChange={e=>set('costPrice',e.target.value)} placeholder="0.00" />
          </div>
          <div className="form-group">
            <label>GST %</label>
            <select value={form.gst} onChange={e=>set('gst',e.target.value)}>
              {[0,5,12,18,28].map(g=><option key={g}>{g}</option>)}
            </select>
          </div>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label>Opening Stock</label>
            <input type="number" value={form.stock} onChange={e=>set('stock',e.target.value)} placeholder="0" />
          </div>
          <div className="form-group">
            <label>Unit</label>
            <select value={form.unit} onChange={e=>set('unit',e.target.value)}>
              {['pcs','kg','g','l','ml','btl','pkt','box','dzn','bag'].map(u=><option key={u}>{u}</option>)}
            </select>
          </div>
        </div>
        <div className="form-group">
          <label>Barcode</label>
          <input value={form.barcode} onChange={e=>set('barcode',e.target.value)} placeholder="Enter barcode number" style={{fontFamily:'var(--font-mono)'}} />
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSubmit}>{product?'Update Product':'Add Product'}</button>
        </div>
      </div>
    </div>
  );
}

// ─── CUSTOMER MODAL ───────────────────────────────────────────────────────────
function CustomerModal({ customer, onSave, onClose }) {
  const [form, setForm] = useState(customer || { name:'',phone:'',email:'',city:'' });
  const set = (k,v) => setForm(prev=>({...prev,[k]:v}));
  const handleSubmit = () => {
    if (!form.name || !form.phone) return;
    onSave(form);
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal modal-sm" onClick={e=>e.stopPropagation()}>
        <h2>{customer?'✏️ Edit Customer':'+ New Customer'}</h2>
        <div className="form-group"><label>Full Name *</label><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Customer name" /></div>
        <div className="form-group"><label>Phone Number *</label><input value={form.phone} onChange={e=>set('phone',e.target.value)} placeholder="10-digit mobile number" /></div>
        <div className="form-group"><label>Email (optional)</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="email@example.com" /></div>
        <div className="form-group"><label>City</label><input value={form.city} onChange={e=>set('city',e.target.value)} placeholder="City" /></div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSubmit}>{customer?'Update':'Add Customer'}</button>
        </div>
      </div>
    </div>
  );
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
